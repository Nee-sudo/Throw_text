<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ocean</title>
    <link rel="stylesheet" href="ocean.css">
</head>
<body>
    <h1>Virtual Ocean - Grab a Bottle</h1> 
    <div id="input-area">
        <input type="text" id="message-title" placeholder="Enter title..." maxlength="10">
        <input type="text" id="message-input" placeholder="Enter your message..." maxlength="500">
        <button type="submit" id="throw-button">Throw</button>
    </div>
    <div class="app">
        <div class="scene-container">
            <div class="sky" style="display: none;"></div>
            <div id="pond">
                <div class="ocean">
                    <div class="ocean-floor">
                        <div class="ocean-floor-contents"></div>
                        <div class="diver">
                            <div class="happy-birthday"><h5>Grab a Bottle</h5></div>
                            <div class="diver-head">
                                <div class="diver-mask">
                                    <div class="eyes">
                                        <div class="eye eye-1"></div>
                                        <div class="eye eye-2"></div>
                                    </div>
                                </div>
                            </div>
                            <div class="diver-body">
                                <div class="tank"></div>
                                <div class="diver-arm"></div>
                            </div>
                            <div class="diver-legs">
                                <div class="diver-leg diver-leg-1">
                                    <div class="leg"></div>
                                    <div class="fin fin-1"></div>
                                </div>
                                <div class="diver-leg diver-leg-2">
                                    <div class="leg"></div>
                                    <div class="fin fin-2"></div>
                                </div>
                            </div>
                        </div>
                        <div class="ocean-floor">
                            <div class="ocean-floor-contents">
                                <div class="crab">
                                    <div class="crab-claw crab-claw-left"></div>
                                    <div class="crab-body">
                                        <div class="crab-head"></div>
                                        <div class="crab-legs">
                                            <div class="crab-leg"></div>
                                            <div class="crab-leg"></div>
                                        </div>
                                    </div>
                                    <div class="crab-claw crab-claw-right"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="bubble bubble--1"></div>
                    <div class="bubble bubble--2"></div>
                    <div class="bubble bubble--3"></div>
                    <div class="bubble bubble--4"></div>
                    <div class="bubble bubble--5"></div>
                    <div class="bubble bubble--6"></div>
                    <div class="bubble bubble--7"></div>
                    <div class="bubble bubble--8"></div>
                    <div class="bubble bubble--9"></div>
                    <div class="bubble bubble--10"></div>
                    <div class="bubble bubble--11"></div>
                    <div class="bubble bubble--12"></div>
                </div>
                <div class="test" id="test">

                </div>
            </div>  </div> 
    </div>
    <script src="ocean.js"></script>
</body>
</html>
