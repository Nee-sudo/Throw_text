<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box</title>
    <link rel="stylesheet" href="box.css">
    <style>
      * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  
  :root {
    --diver: rgb(35, 35, 40);
  }
  
  body { /* Added body styling for centering input area */
    display: flex;
    flex-direction: column;
    min-height: 100vh; /* Ensure body takes full viewport height */
}
.app {
  flex: 1; /* Allow the .app to take up remaining space */
  width: 100%;
  position: relative;
  font-family: sans-serif;
  overflow: hidden; /* Hide overflow from animations */
}
  
.scene-container {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
}
  
  .sky {
    height: 20%;
    background-image: radial-gradient(
      farthest-side at 120% 65%,
      yellow,
      rgb(252, 189, 73),
      rgb(96, 171, 233),
      rgb(119, 180, 230)
    );
    width: 100%;
  }
  
  .ocean {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100%;
    border-top-left-radius: 5px;
    /* border-top-right-radius:; */
    /* border: 2px solid black; */
    overflow: hidden;
    background: linear-gradient(
      rgb(55, 75, 135),
      rgb(45, 85, 185),
      rgb(25, 15, 235)
    );
  }
  
  .ocean::after {
    content: "";
    top: 0;
    width: 150%;
    height: 60px;
    background: rgba(255, 255, 255, 0.5);
    position: absolute;
    filter: blur(80px);
  }
  
  .ocean::before {
    content: "";
    position: absolute;
    height: 100%;
    width: 150%;
    background: linear-gradient(black, black, transparent);
    transform: rotate(35deg) translateX(-45%) translateY(15%);
    filter: blur(250px);
  }
  
  .ocean-floor {
    width: 100%;
    height: 15px;
    width: 100%;
    background: tan;
    position: absolute;
    bottom: 0;
  }
  
  .ocean-floor-contents {
    position: relative;
    width: 100%;
    height: 100%;
    z-index: 5;
  }
  
  .shell {
    height: 10px;
    width: 30px;
    background: white;
    position: absolute;
    right: 3rem;
    bottom: 1rem;
    border-radius: 0.25rem;
    border-top-left-radius: 50%;
    border-top-right-radius: 50%;
    box-shadow: -5px 2px 5px rgba(15, 15, 15, 0.6) inset;
    /* transform: skew(300deg); */
  }
  
  .ocean-floor::after {
    content: "";
    position: absolute;
    width: 150%;
    height: 150px;
    border-radius: 50%;
    background: tan;
    top: -15px;
    box-shadow: 2px 3px 25px 5px rgba(15, 15, 15, 0.7) inset;
  }
  
  .ocean-floor::before {
    content: "";
    position: absolute;
    width: 150%;
    height: 100px;
    border-radius: 50%;
    background: tan;
    top: -5px;
    left: -50%;
    box-shadow: 2px 3px 15px black inset;
  }
  
  .seaweed-parent {
    width: 100px;
    height: 10px;
    position: absolute;
    z-index: 5;
  }
  
  .seaweed-section {
    position: absolute;
    z-index: 5;
    transform-origin: bottom;
  }
  
  .seaweed-section-1 {
    transform: rotate(25deg) translateX(-1rem);
  }
  
  .seaweed-section-3 {
    transform: rotate(-25deg);
  }
  
  .seaweed {
    width: 10px;
    height: 10px;
    position: relative;
    border-radius: 15%;
    left: 10px;
    background: green;
    /* border: 2px solid black; */
    animation: seaweed 16s cubic-bezier(0.075, 0.82, 0.165, 1) infinite;
  }
  
  .seaweed-animation-1 {
    animation: seaweed2 16s cubic-bezier(0.375, 0.82, 0.865, 1.2) infinite;
  }
  
  .seaweed-animation-2 {
    animation: seaweed 17s cubic-bezier(0.275, 0.52, 0.765, 1.1) infinite;
  }
  
  .seaweed-animation-3 {
    animation: seaweed2 15s 1s cubic-bezier(0.275, 0.52, 0.765, 1.1) infinite;
  }
  
  @keyframes seaweed {
    0% {
      transform: rotate(0deg);
    }
    15% {
      transform: rotate(2deg);
    }
    30% {
      transform: rotate(3deg);
    }
    45% {
      transform: rotate(1deg);
    }
    60% {
      transform: rotate(-1deg);
    }
    75% {
      transform: rotate(-4deg);
    }
    85% {
      transform: rotate(2deg);
    }
    100% {
      transform: rotate(0deg);
    }
  }
  
  @keyframes seaweed2 {
    0% {
      transform: rotate(0deg);
    }
    15% {
      transform: rotate(3deg);
    }
    30% {
      transform: rotate(1deg);
    }
    45% {
      transform: rotate(-3deg);
    }
    60% {
      transform: rotate(1deg);
    }
    75% {
      transform: rotate(-3deg);
    }
    85% {
      transform: rotate(1deg);
    }
    100% {
      transform: rotate(0deg);
    }
  }
  
  /* DIVER */
  
  .diver {
    width: 200px;
    height: 75px;
    /* border: 1px solid black; */
    position: absolute;
    display: flex;
    align-items: center;
    bottom: 5rem;
    animation: swimmingby 20s cubic-bezier(0.275, 0.385, 0.62, 1.275) infinite;
    /* transform: scale(0.65); */
  }
  
  .happy-birthday {
    position: absolute;
    top: -2rem;
    left: 3rem;
    background: white;
    padding: 0.5rem;
    border-radius: 40%;
    border-bottom-left-radius: 100px;
    animation: happybday 20s infinite;
  }
  
  .happy-birthday::after {
    content: "";
    width: 6px;
    height: 7px;
    background: white;
    position: absolute;
    border-radius: 40%;
    left: -1rem;
  }
  
  .happy-birthday::before {
    content: "";
    width: 10px;
    height: 10px;
    background: white;
    position: absolute;
    border-radius: 40%;
    left: -0.7rem;
    /* left: -1rem;
    top: 4rem; */
  }
  
  @keyframes happybday {
    0% {
      filter: blur(100px);
      opacity: 0;
    }
    /* 25% {
      opacity: 0;
    } */
    50% {
      opacity: 0;
      filter: blur(100px);
    }
    55% {
      opacity: 1;
      filter: blur(0px);
    }
    65% {
      filter: blur(0px);
    }
    /* 75% {
      opacity: 0;
    } */
    100% {
      filter: blur(100px);
      opacity: 0;
    }
  }
  
  @keyframes swimmingby {
    0% {
      transform: translateX(125vw) translateY(-10rem);
    }
    50% {
      transform: translateX(50vw) translateY(2rem);
    }
    65% {
      transform: translateX(35vw) translateY(1rem);
    }
    100% {
      transform: translateX(-125vw) translateY(-5rem) rotate(35deg);
    }
  }
  
  .diver-head {
    width: 30px;
    height: 35px;
    /* border: 2px solid black; */
    border-radius: 50%;
    transform: translate(0.5rem, -0.85rem);
    background: black;
    background: var(--diver);
  }
  
  .diver-body {
    width: 75px;
    height: 25px;
    border-radius: 1rem;
    border-bottom-left-radius: 50%;
    border-top-right-radius: 50%;
    border-bottom-right-radius: 35%;
    /* border: 2px solid black; */
    background: black;
    background: var(--diver);
  
    position: relative;
  }
  
  .tank {
    width: 60px;
    height: 13px;
    background: grey;
    border-radius: 10px;
    border-top-right-radius: 1px;
    border-bottom-right-radius: 1px;
    position: absolute;
    left: 0.65rem;
    z-index: 5;
    top: -0.25rem;
    box-shadow: 4px 2px 10px rgba(15, 20, 20, 0.85) inset;
  }
  
  .diver-arm {
    width: 40px;
    height: 10px;
    /* border: 2px solid red; */
    background: black;
    background: var(--diver);
  
    border-radius: 1rem;
    border-bottom-left-radius: 50%;
    position: absolute;
    top: 0.65rem;
    left: -30px;
    /* transform: rotate(-25deg) translateY(0.75rem); */
    transform-origin: right;
    animation: swimmingarm 4s cubic-bezier(0.175, 0.885, 0.32, 1.275) infinite;
  }
  
  .diver-arm::after {
    content: "";
    width: 20px;
    height: 15px;
    background: var(--diver);
    position: absolute;
    left: -0.5rem;
    top: -0.15rem;
    border-radius: 2rem;
  }
  
  @keyframes swimmingarm {
    0% {
      transform: rotate(-145deg) translateY(0.25rem);
    }
    50% {
      transform: rotate(-25deg) translateY(0.25rem);
    }
    100% {
      transform: rotate(-145deg) translateY(0.25rem);
    }
  }
  
  .diver-legs {
    width: 85px;
    height: 50px;
    border-radius: 1rem;
    transform: rotateX(65deg) translateX(-0.5rem);
    /* transform: rotateX(20deg); */
    /* border: 2px solid black; */
  }
  
  .diver-leg {
    width: 100%;
    height: 25px;
    /* border: 2px solid black; */
    display: flex;
    align-items: center;
    transform-origin: left;
  }
  
  .diver-leg-1 {
    animation: swimleg1 2s linear infinite;
  }
  
  @keyframes swimleg1 {
    0% {
      transform: rotate(5deg) translateY(0.25rem);
    }
    50% {
      transform: rotate(-5deg) translateY(0.25rem);
    }
    100% {
      transform: rotate(5deg) translateY(0.25rem);
    }
  }
  
  .diver-leg-2 {
    animation: swimleg2 2s linear infinite;
  }
  
  @keyframes swimleg2 {
    0% {
      transform: rotate(-5deg) translateY(-0.15rem);
    }
    50% {
      transform: rotate(5deg) translateY(-0.15rem);
    }
    100% {
      transform: rotate(-5deg) translateY(-0.15rem);
    }
  }
  
  .leg {
    width: 65%;
    height: 20px;
    /* border: 2px solid black; */
    background: var(--diver);
  }
  
  .fin {
    width: 45%;
    height: 30px;
    /* border: 2px solid black; */
    transform: rotate(25deg);
    transform-origin: left;
    background: linear-gradient(to right, rgb(35, 45, 45), rgb(15, 15, 20));
  }
  
  .fin-1 {
    animation: fin2 2s linear infinite;
  }
  
  @keyframes fin1 {
    0% {
      transform: rotate(-15deg) translateY(-0.15rem);
    }
    50% {
      transform: rotate(15deg) translateY(-0.15rem);
    }
    100% {
      transform: rotate(-15deg) translateY(-0.15rem);
    }
  }
  
  .fin-2 {
    animation: fin1 2s linear infinite;
  }
  
  @keyframes fin2 {
    0% {
      transform: rotate(-15deg) translateY(-0.15rem);
    }
    50% {
      transform: rotate(15deg) translateY(-0.15rem);
    }
    100% {
      transform: rotate(-15deg) translateY(-0.15rem);
    }
  }
  
  /*FISH */
  
  .fish-body {
    width: 45px;
    height: 25px;
    /* border: 1px solid black; */
    background: var(--color);
    position: absolute;
    border-radius: 50%;
    box-shadow: 2px -5px 15px rgba(35, 25, 25, 0.5) inset;
  }
  
  .fish-swim-left {
    transform: translateX(-50vw) translateY(-3rem);
  }
  
  @keyframes fishswimleft {
    0% {
      transform: translateX(-50vw) translateY(-3rem);
    }
    100% {
      transform: translateX(150vw) translateY(2rem);
    }
  }
  
  .fish-swim-right {
    transform: translateX(150vw) translateY(3rem);
  }
  
  @keyframes fishswimright {
    0% {
      transform: translateX(150vw) translateY(3rem);
    }
    50% {
      transform: translateX(50vw) translateY(1rem);
    }
    100% {
      transform: translateX(-50vw) translateY(-2rem);
    }
  }
  
  .fish-swim-left::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: var(--color);
    left: -10px;
    clip-path: polygon(13% 0, 3% 100%, 100% 53%);
  }
  
  .fish-swim-left::before {
    content: "";
    width: 4px;
    height: 4px;
    background: rgba(25, 25, 30, 0.5);
    position: absolute;
    right: 0.5rem;
    top: 0.5rem;
  }
  
  .fish-swim-right::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: var(--color);
    left: 32.5px;
    clip-path: polygon(94% 0, 0 49%, 100% 100%);
  }
  
  .fish-swim-right::before {
    content: "";
    width: 4px;
    height: 4px;
    background: rgba(25, 25, 30, 0.5);
    position: absolute;
    left: 0.5rem;
    top: 0.5rem;
  }
  
  .crab {
    width: 60px;
    height: 25px;
    /* border: 1px solid black; */
    position: absolute;
    left: 6rem;
    bottom: 0.75rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transform: scale(0.7);
    /* animation: crabwalk 25s 3s cubic-bezier(0.15, 0.26, 0.65, 1.34) infinite; */
  }
  
  .crab-claw {
    width: 10px;
    height: 20px;
    /* border: 1px solid black; */
    background: red;
    box-shadow: 5px 3px 5px rgba(25, 25, 20, 0.5) inset;
  }
  .crab-claw-left {
    transform: rotate(35deg);
    border-top-left-radius: 100px;
    transform-origin: right;
    clip-path: polygon(0 0, 100% 0, 73% 100%, 49% 71%, 18% 100%);
    animation: clawleft 13s cubic-bezier(0.39, 0.575, 0.565, 1) infinite;
  }
  
  @keyframes clawleft {
    0% {
      transform: rotate(55deg) translateY(0.25rem);
    }
    50% {
      transform: rotate(35deg) translateX(0.5rem) translateY(0.25rem);
    }
  
    100% {
      transform: rotate(55deg) translateY(0.25rem);
    }
  }
  
  .crab-claw-right {
    transform: rotate(-35deg);
    border-top-right-radius: 100px;
    transform-origin: left;
    animation: clawright 13s cubic-bezier(0.39, 0.575, 0.565, 1) infinite;
  
    clip-path: polygon(0 0, 100% 0, 73% 100%, 49% 71%, 18% 100%);
  }
  
  @keyframes clawright {
    0% {
      transform: rotate(-55deg) translateY(0.25rem);
    }
    50% {
      transform: rotate(-35deg) translateX(-0.5rem) translateY(0.25rem);
    }
  
    100% {
      transform: rotate(-55deg) translateY(0.25rem);
    }
  }
  .crab-body {
    height: 100%;
    width: 25px;
  
    /* border: 1px solid black; */
  }
  
  .crab-head {
    height: 75%;
    width: 100%;
    border-radius: 2px;
    z-index: 10;
    position: relative;
    /* border: 1px solid black; */
    background: red;
    border-radius: 10px;
    box-shadow: 2px 3px 5px rgba(25, 25, 20, 0.5) inset;
  }
  
  .crab-legs {
    display: flex;
    height: 15%;
    width: 100%;
    justify-content: space-evenly;
  }
  
  .crab-leg {
    height: 100%;
    width: 6px;
    background: red;
    position: relative;
  }
  
  .octopus {
    height: 150px;
    width: 55px;
    border-radius: 1rem;
    /* border: 3px solid red; */
    position: absolute;
    left: 45%;
    top: 45%;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    transform: scale(0.75) translateX(125vw);
    animation: octopusswimleft 13s 4s cubic-bezier(0.475, 0.385, 0.62, 1.075)
      infinite;
    /* justify-content: center; */
  }
  
  @keyframes octopusswimleft {
    0% {
      transform: scale(0.75) translateX(125vw);
    }
  
    45% {
      transform: scale(0.65) translateX(20vw) translateY(3rem);
    }
  
    100% {
      transform: scale(0.75) translateX(-125vw) translateY(-1.5rem);
    }
  }
  
  .octopus-head {
    height: 70px;
    border-radius: 100px;
    /* border-bottom-left-radius:100px;
    border-bottom-right-radius:100px; */
    width: 50px;
    position: absolute;
    background: gray;
    z-index: 5;
    /* box-shadow: 2px 3px 15px black inset; */
  }
  
  .octopus-head::after {
    content: "";
    position: absolute;
    top: 0;
    width: 80px;
    height: 50px;
    background: gray;
    border-radius: 50%;
    left: -15px;
    box-shadow: 2px 3px 15px black inset;
  }
  
  .octopus-body {
    height: 100px;
    width: 100%;
    /* border: 2px solid red; */
    display: flex;
    position: absolute;
    bottom: 0;
  }
  
  .octopus-arm {
    height: 100%;
    flex: 1;
    /* border: 2px solid pink; */
    position: relative;
    transform: translateY(-1rem);
  }
  
  .octopus-tentacle-segment {
    height: 10px;
    width: 3px;
    background: grey;
    position: relative;
    bottom: -10px;
    box-shadow: 2px 3px 5px rgba(15, 15, 15, 0.4) inset;
  
    /* left: 5px; */
  }
  
  .octopus-animation-1 {
    animation: octopustentacle 12s cubic-bezier(0.175, 0.885, 0.32, 1.275)
      infinite;
  }
  
  @keyframes octopustentacle {
    0% {
      transform: rotate(0deg);
    }
    20% {
      transform: rotate(20deg);
    }
    40% {
      transform: rotate(-10deg);
    }
    60% {
      transform: rotate(20deg);
    }
    80% {
      transform: rotate(5deg);
    }
    100% {
      transform: rotate(0deg);
    }
  }
  
  .octopus-animation-2 {
    animation: octopustentacle2 12s cubic-bezier(0.175, 0.885, 0.32, 1.275)
      infinite;
  }
  
  @keyframes octopustentacle2 {
    0% {
      transform: rotate(0deg);
    }
    20% {
      transform: rotate(-5deg);
    }
    40% {
      transform: rotate(5deg);
    }
    60% {
      transform: rotate(8deg);
    }
    80% {
      transform: rotate(-3deg);
    }
    100% {
      transform: rotate(0deg);
    }
  }
  
  .octopus-animation-3 {
    animation: octopustentacle3 15s cubic-bezier(0.175, 0.885, 0.32, 1.275)
      infinite;
  }
  
  @keyframes octopustentacle3 {
    0% {
      transform: rotate(0deg);
    }
    20% {
      transform: rotate(-7deg);
    }
    40% {
      transform: rotate(-3deg);
    }
    60% {
      transform: rotate(2deg);
    }
    80% {
      transform: rotate(1deg);
    }
    100% {
      transform: rotate(0deg);
    }
  }
 
  /* extra code  */
  
  #input-area {
    display: flex;
    justify-content: center; /* Center horizontally */
    align-items: center; /* Center vertically */
    margin: 20px auto; /* Center the input area */
    width: 80%; /* Limit width on larger screens */
    max-width: 500px; /* Set a maximum width */
}
#message-title, #message-input {
  padding: 8px;
  border: 1px solid #ccc;
  border-radius: 4px;
  margin-right: 10px; /* Space between inputs and button */
  flex: 1; /* Allow inputs to grow */
}
#throw-button {
  padding: 8px 16px;
  background-color: #4caf50;
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}
#pond {
  width: 100%; /* Use 100% not 100vw to stay within app's bounds */
  height: 100%; /* Use 100% not 100vh */
  position: relative;
  border-radius: 10px;
  box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.2);
  overflow: hidden; /* Important: Keep overflow hidden */
}

    .bottle {
        position: absolute;
        width: 50px; /* Adjust bottle size */
        height: 80px; /* Adjust bottle size */
        background: url("bottle.png"); /* Replace with your bottle image */
        background-size: contain;
        background-repeat: no-repeat;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white; /* Text color inside bottle */
        font-size: 12px; /* Adjust font size */
        transform-origin: center bottom; /* For proper rotation */
        animation: float 4s linear infinite, wave 2s linear infinite; /* Add float and wave animation */
        z-index: 10; /* Ensure bottles are above the ocean */
    }
    
    .bottle span {
  max-width: 100%; /* Occupy full width of the bottle */
  overflow: hidden; /* Hide overflowing text */
  text-overflow: ellipsis; /* Add ellipsis (...) for overflow */
  white-space: nowrap; /* Prevent text from wrapping */
  text-align: center;
    }
    
    @keyframes float {
        0% { transform: translateY(0); }
        50% { transform: translateY(-10px); } /* Adjust float height */
        100% { transform: translateY(0); }
    }
    
    @keyframes wave {
        0% { transform: rotate(-2deg); } /* Adjust wave angle */
        50% { transform: rotate(2deg); }
        100% { transform: rotate(-2deg); }
    }
    
    .message-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0px 5px 10px rgba(0, 0, 0, 0.3);
      z-index: 1000; /* Ensure it's on top */
    }
    
    .message-popup h2 {
      margin-top: 0;
    }
    
    .message-popup button {
      margin-top: 10px;
      padding: 8px 16px;
      background-color: #4caf50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    @media (max-width: 768px) { /* Example: Adjust for tablets and smaller */
      #input-area {
          flex-direction: column; /* Stack input elements */
          width: 90%;
      }
      #message-title, #message-input {
          margin: 5px 0; /* Add margin between stacked inputs */
          flex: auto; /* Inputs take available width */
      }
      #throw-button {
          margin-top: 10px; /* Space button below inputs */
          margin-left: 0;
          width: 100%; /* Button takes full width */
      }
  
      .diver {
          transform: scale(0.7); /* Make diver smaller on mobile */
      }
  
      /* Adjust other element sizes/positions as needed */
      .crab {
          transform: scale(0.5);
      }
  }
  
  @media (max-width: 480px) { /* Example: Adjust for phones */
      .diver {
          transform: scale(0.5); /* Even smaller on phones */
      }
      .crab {
          transform: scale(0.3);
      }
      /* Further adjustments for smaller screens */
  }
    </style>
</head>
<body>
    <div id="input-area">
  <input type="text" id="message-title" placeholder="Enter title..." maxlength="10"> <br> <br>
  <input type="text" id="message-input" placeholder="Enter your message...">
  <button id="throw-button">Throw</button>
</div>
    <div class="app">
        <div class="scene-container">
          <div class="sky" style="display: none;"></div>
          <div id="pond">
            <div class="ocean">
                <div class="ocean-floor">
                    <div class="ocean-floor-contents">
                        </div>
                <!-- DIVER -->
                <div class="diver">
                  <div class="happy-birthday">
                    <h5>Grab a Bottle</h5>
                  </div>
                  <div class="diver-head">
                    <div class="diver-mask">
                      <div class="eyes">
                        <div class="eye eye-1"></div>
                        <div class="eye eye-2"></div>
                      </div>
                    </div>
                  </div>
                  <div class="diver-body">
                    <div class="tank"></div>
                    <div class="diver-arm"></div>
                  </div>
                  <div class="diver-legs">
                    <div class="diver-leg diver-leg-1">
                      <div class="leg"></div>
                      <div class="fin fin-1"></div>
                    </div>
                    <div class="diver-leg diver-leg-2">
                      <div class="leg"></div>
                      <div class="fin fin-2"></div>
                    </div>
                  </div>
                </div>
                <!-- DIVER ENDS-->
                <div class="ocean-floor">
                  <div class="ocean-floor-contents">
                    <div class="crab">
                      <div class="crab-claw crab-claw-left"></div>
                      <div class="crab-body">
                        <div class="crab-head"></div>
                        <div class="crab-legs">
                          <div class="crab-leg"></div>
                          <div class="crab-leg"></div>
                        </div>
                      </div>
                      <div class="crab-claw crab-claw-right"></div>
                    </div>
                  </div>
                  <!-- SEAWEED-->
                </div>
              </div>
          </div>
        </div>
      </div>
      <script src="test.js"></script>
      <script>
        let oceanFloorContents = document.querySelector(".ocean-floor-contents");
      let oceanEl = document.querySelector(".ocean");
      function generateSeaWeed(bottom, left, scale) {
        let oceanFloor = document.querySelector(".ocean-floor");

        let seaWeedParent = document.createElement("div");
        seaWeedParent.className = "seaweed-parent";
        for (let i = 0; i < 3; i++) {
          let seaweedSection = document.createElement("div");
          seaweedSection.className = `seaweed-section seaweed-section-${i + 1}`;
          let lastNode;
          for (let j = 0; j < 10; j++) {
            let seaweed = document.createElement("div");
            seaweed.className = `seaweed seaweed-animation-${i + 1}`;

            if (!lastNode) {
              console.log("no children!");
              seaweedSection.appendChild(seaweed);
            } else {
              lastNode.appendChild(seaweed);
            }
            lastNode = seaweed;
          }
          seaWeedParent.appendChild(seaweedSection);
        }
        oceanFloorContents.appendChild(seaWeedParent);
        seaWeedParent.style.left = left;
        seaWeedParent.style.bottom = bottom;
        seaWeedParent.style.transform = `rotate(-90deg)scale(${scale})`;
      }

      generateSeaWeed("1rem", "5%", 0.4);
      generateSeaWeed(".85rem", "45%", 0.6);
      generateSeaWeed("1.1rem", "85%", 0.3);

      function generateShells(count) {
        for (let i = 0; i < count; i++) {
          let shell = document.createElement("div");
          shell.className = "shell";
          let left = Math.random() * 100;
          let bottom = Math.random() * 1;
          left = left > 15 ? left : 15;
          shell.style.left = `${left}%`;
          // shell.style.width = width;
          // shell.style.height = height;
          shell.style.bottom = `${bottom}rem`;
          oceanFloorContents.appendChild(shell);
        }
      }

      generateShells(4);

      function generateFish(count) {
        for (let i = 0; i < count; i++) {
          let color = `rgb(${(Math.random() * 255) | 0},${
            (Math.random() * 255) | 0
          },${(Math.random() * 255) | 0})`;
          let fishEl = document.createElement("div");
          let bottom = (Math.random() * 100) | 0;
          bottom = bottom > 15 ? bottom : 15;
          fishEl.className = "fish-body";
          fishEl.style.bottom = `${bottom}%`;
          fishEl.style.setProperty("--color", color);
          let time = (Math.random() * 15) | (0 + 12);
          let delay = (Math.random() * 8) | 0;
          let animationStyle =
            Math.random() > 0.5 ? "cubic-bezier(.2,.4,.8,1.2)" : "linear";

          if (Math.random() > 0.5) {
            fishEl.classList.add("fish-swim-left");

            fishEl.style.animation = `fishswimleft ${time}s ${delay}s ${animationStyle} infinite`;
          } else {
            fishEl.classList.add("fish-swim-right");
            let style =
              Math.random() > 0.5 ? "cubic-bezier(.2,.4,.8,1.2)" : "linear";
            fishEl.style.animation = `fishswimright ${time}s ${delay}s ${animationStyle} infinite`;
          }
          oceanEl.appendChild(fishEl);
        }
      }

      generateFish(6);



      function generateOctopus() {
        let animations = [
          "octopus-animation-1",
          "octopus-animation-2",
          "octopus-animation-3",
          // "octopus-animation-4",
        ];
        let octopus = document.createElement("div");
        let octopusHead = document.createElement("div");
        let octopusBody = document.createElement("div");
        octopus.className = "octopus";
        octopusHead.className = "octopus-head";
        octopusBody.className = "octopus-body";
        octopus.appendChild(octopusHead);
        octopus.appendChild(octopusBody);

        oceanEl.appendChild(octopus);
        for (let i = 0; i < 8; i++) {
          let octopusArm = document.createElement("div");
          octopusArm.className = "octopus-arm";
          octopusBody.appendChild(octopusArm);
          let animation = animations[(Math.random() * animations.length) | 0];
          let lastNode;
          for (let j = 0; j < 10; j++) {
            let armBit = document.createElement("div");
            armBit.className = `octopus-tentacle-segment ${animation}`;
            if (!lastNode) {
              octopusArm.appendChild(armBit);
            } else {
              lastNode.appendChild(armBit);
            }
            lastNode = armBit;
          }
        }
      }

      generateOctopus();

      const pond = document.getElementById('pond');
      const messageInput = document.getElementById('message-input');
      const messageTitle = document.getElementById('message-title');
      const throwButton = document.getElementById('throw-button');
      
      throwButton.addEventListener('click', () => {
          const title = messageTitle.value.trim();
          const message = messageInput.value.trim();
      
          if (title !== "" && message !== "") {
              // Get IP address (using a free service for demonstration)
              fetch('https://api.ipify.org?format=json') // or a better IP geolocation service
                  .then(response => response.json())
                  .then(data => {
                      const ipAddress = data.ip;
                      sendDataToBackend(title, message, ipAddress);
                  })
                  .catch(error => {
                      console.error("Error getting IP address:", error);
                      // Handle the error appropriately, perhaps use a default IP or don't send IP
                      sendDataToBackend(title, message, "IP address not found"); // Example: send "not found"
                  });
      
      
              messageInput.value = "";
              messageTitle.value = "";
          }
      });
      
      function sendDataToBackend(title, message, ipAddress) {
          fetch('/api/messages', { // Replace with your backend endpoint
              method: 'POST',
              headers: {
                  'Content-Type': 'application/json'
              },
              body: JSON.stringify({ title, message, ipAddress })
          })
          .then(response => response.json())
          .then(data => {
              console.log('Data sent to backend:', data);
              createBottle(title, message); // Create the bottle after successful send
              fetchAndDisplayMessages();      // Update the display with all messages
          })
          .catch(error => {
              console.error('Error sending data to backend:', error);
          });
      }
      
      function createBottle(title, message) {
          const bottle = document.createElement('div');
          bottle.classList.add('bottle');
      
          const x = Math.random() * (pond.offsetWidth - 50);
          const y = Math.random() * (pond.offsetHeight - 80);
      
          bottle.style.left = x + 'px';
          bottle.style.top = y + 'px';
      
          const titleSpan = document.createElement('span');
          titleSpan.textContent = title;
          bottle.appendChild(titleSpan);
      
          bottle.addEventListener('click', () => {
              showMessagePopup(title, message);
          });
      
          pond.appendChild(bottle); // Append to pond, not ocean
      }
      
      function showMessagePopup(title, message) { // Add title parameter
          const popup = document.createElement('div');
          popup.classList.add('message-popup');
          popup.innerHTML = `<h2>${title}</h2><p>${message}</p><button onclick="closeMessagePopup()">Close</button>`; // Include title in popup
          document.body.appendChild(popup);
      }
      
      // ... (closeMessagePopup function remains the same) ...
      function closeMessagePopup() {
          const popup = document.querySelector('.message-popup');
          popup.remove();
      }   

      function fetchAndDisplayMessages() {
        fetch('/api/messages') // Get all messages from the backend
            .then(response => response.json())
            .then(messages => {
                pond.innerHTML = ''; // Clear existing bottles
                messages.forEach(msg => {
                    createBottle(msg.title, msg.message);
                });
            })
            .catch(error => {
                console.error("Error fetching messages:", error);
            });
    }
    
    // Call this function initially to display any existing messages
    fetchAndDisplayMessages();
      </script>
</body>
</html>
