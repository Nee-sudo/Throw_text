<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <link rel="icon" href="image.png" type="image/x-icon" />
    <link
      href="https://cdn.quilljs.com/1.3.6/quill.snow.css"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A simple text-sharing tool to avoid signing up or logging in for transferring text between devices."
    />
    <!-- Prism.js CSS (for styling) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
    />

    <!-- Prism.js Script (for highlighting) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>

    <link rel="stylesheet" href="index.css" />
    <title>Simple Text Storage</title>

  </head>
  <body>
    <div
      class="marque-container"
      style="background-color: rgb(189, 195, 241); position: relative"
    >
      <p class="marque" style="color: #333">
        A simple tool to share text without signing up or logging in.
      </p>
      <button
        onclick="this.parentElement.style.display='none';"
        style="
          position: absolute;
          top: 5px;
          right: 10px;
          background-color: transparent;
          border: none;
          font-size: 16px;
          cursor: pointer;
        "
      >
        &times;
      </button>
    </div>
    <header>
      <h1>Throw Your Text</h1>
    </header>
    <div id="editor"></div>
    <div>
      <button onclick="saveText()">Save Text</button>
      <button onclick="loadTexts()">Load Texts</button>
    </div>
    <p id="unique-visitors" style="color: white">Loading unique visitors...</p>
    <p id="frequent-visitors"><!---Loading frequent visitors... --></p>
    <div id="formattedContent"></div>

    <script>
      var quill = new Quill("#editor", {
        theme: "snow",
      });

      async function saveText() {
        const text = quill.root.innerHTML;

        try {
            const dateTime = new Date().toISOString();
            const serialNumber = Date.now(); // Using timestamp as a unique serial number

            await fetch("/api/texts/save", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ content: text, dateTime, serialNumber }),
          });
          // Clear the editor after successful submission
          quill.setText("");
        } catch (error) {
          console.error(error);
          // Handle errors if needed
        }
      }

      function formatContent(str) {
        return str
          .replace(/<\/p>\s*<p>/g, "\n") // Replace closing </p> followed by <p> with a newline
          .replace(/<\/?p>/g, "") // Remove all <p> tags
          .trim();
      }

      async function loadTexts() {
        const response = await fetch("/api/texts/all");
        const texts = await response.json();

        const textList = document.getElementById("formattedContent");
        textList.innerHTML = `<div style="display: flex; justify-content: center; align-item: center;"></div><span class="loader"></span>`;
        textList.innerHTML = ``;

        texts.forEach((text, index) => {
          const listItem = document.createElement("div");
          listItem.style.margin = "30px 0";

          // Decode HTML entities to get the actual source code
          const decodedContent = decodeHTMLEntities(text.content);

          listItem.innerHTML = `
        <div class="outer-snippet">
          <div class="title-bar">
            <div class="red-dot dot"></div>
            <div class="blue-dot dot"></div>
            <div class="green-dot dot"></div>
        <p style="color: white; float: left;">Count: ${index + 1}</p>
        <p style="color: white; float: right;">DateTime: ${convertUTCToIST(text.dateTime)}</p>
          </div>
          <div class="inner-snippet">${text.content}</div>
        </div>
        <button class="delete" onclick="deleteText('${text._id}')">Delete</button>
        <button class="copy" onclick="copyText('${text._id}')">Copy</button>
          `;

          textList.appendChild(listItem);
        });

        // Re-run Prism to highlight new code blocks
        Prism.highlightAll();
      }

      // Function to decode HTML entities back to their original characters
      function decodeHTMLEntities(str) {
        let textarea = document.createElement("textarea");
        textarea.innerHTML = str;
        return textarea.value;
      }

      // Function to escape HTML to prevent XSS issues (keeping code safe inside <pre><code>)
      function escapeHTML(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      loadTexts();

      async function deleteText(textId) {
        try {
          // Make a DELETE request to your API endpoint
          await fetch(`/api/texts/${textId}`, {
            method: "DELETE",
          });

          // Reload the text list after deleting the text
          loadTexts();
        } catch (error) {
          console.error("Error deleting text:", error);
          // Handle errors if needed
        }
      }

      async function copyText(textId) {
        try {
          const response = await fetch(`/api/texts/${textId}`);

          if (!response.ok) {
            throw new Error(
              `Error: ${response.status} - ${response.statusText}`
            );
          }

          const text = await response.json();

          // Call the new copyFormattedText function
          copyFormattedText(text.content);
        } catch (error) {
          console.error("Error copying text:", error);
          alert("Failed to copy text. Check the console for details.");
        }
      }

      function copyFormattedText(formattedText) {
        const tempElement = document.createElement("div");
        tempElement.innerHTML = formattedText; // Set the formatted text

        tempElement.style.position = "absolute";
        tempElement.style.left = "-9999px";
        tempElement.style.top = "0";
        document.body.appendChild(tempElement);

        const range = document.createRange();
        range.selectNodeContents(tempElement);
        const selection = window.getSelection();
        selection.removeAllRanges();
        selection.addRange(range);

        try {
          document.execCommand("copy");
          console.log("Formatted text copied to clipboard!");
          alert("Text copied successfully!"); // Or other feedback
        } catch (err) {
          console.error("Unable to copy formatted text:", err);

          navigator.clipboard
            .writeText(tempElement.innerText) // Fallback
            .then(() => {
              console.log("Text copied (fallback)");
              alert("Text copied successfully! (Plain Text)"); //Alerting for fallback
            })
            .catch((err) => console.error("Clipboard API error:", err));
        } finally {
          document.body.removeChild(tempElement);
        }
      }

      // Function to decode HTML entities
      function decodeHTMLEntities(text) {
        const tempDiv = document.createElement("div");
        tempDiv.innerHTML = text;
        return tempDiv.textContent || tempDiv.innerText || "";
      }

      // Your existing JavaScript code for loading texts can go here
      // Track visitor on page load
      async function trackVisitor() {
        try {
          await fetch("/api/visitors/track-visitor");
        } catch (error) {
          console.error("Error tracking visitor:", error);
        }
      }

      function convertUTCToIST(utcTimestamp) {
          if(!utcTimestamp){
            return "N/A";
          }
          const utcDate = new Date(utcTimestamp);
      
          // Convert to IST (UTC+5:30)
          // const offset = 5.5 * 60; // IST offset in minutes
          const istDate = new Date(utcDate.getTime() /*+ offset * 60 * 1000 */);
      
          // Format the IST date as desired
          return istDate.toLocaleString("en-IN");
      }

      // Get and display visitor stats
      async function loadVisitorStats() {
        try {
          const response = await fetch("/api/visitors/stats");
          const data = await response.json();

          document.getElementById(
            "unique-visitors"
          ).innerText = `Unique Visitors: ${data.uniqueVisitors}`;
          // document.getElementById(
          //   "frequent-visitors"
          // ).innerText = `Frequent Visitors: ${JSON.stringify(
          //   data.frequentVisitors
          // )}`;
        } catch (error) {
          console.error("Error loading visitor stats:", error);
        }
      }

      // Call functions on loading page
      window.onload = () => {
        trackVisitor();
        loadVisitorStats();
      };
    </script>
  </body>
</html>
