<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <link rel="icon" href="image.png" type="image/x-icon">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple text-sharing tool to avoid signing up or logging in for transferring text between devices.">
  <link rel="stylesheet" href="index.css">
  <title>Simple Text Storage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    header {
      background-color: aqua;
      color: white;
      padding: 10px 0;
    }
    .marque-container {
      background: #f4f4f4;
      padding: 10px;
    }
    .marque {
      font-size: 14px;
      color: #333;
    }
    #editor {
      margin: 20px auto;
      width: 80%;
      height: 300px;
      border: 1px solid #ccc;
    }
    button {
      align-items: center;
  background-color: #fff;
  border-radius: 12px;
  box-shadow: transparent 0 0 0 3px,rgba(18, 18, 18, .1) 0 6px 20px;
  box-sizing: border-box;
  color: #121212;
  cursor: pointer;
  display: inline-flex;
  flex: 1 1 auto;
  font-family: Inter,sans-serif;
  font-size: 1.2rem;
  font-weight: 700;
  justify-content: center;
  line-height: 1;
  margin: 0;
  outline: none;
  padding: 1rem 1.2rem;
  text-align: center;
  text-decoration: none;
  transition: box-shadow .2s,-webkit-box-shadow .2s;
  white-space: nowrap;
  border: 0;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
    }
    button:hover {
      box-shadow: #121212 0 0 0 3px, transparent 0 0 0 0;
    }
    #formattedContent {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="marque-container" style="background-color: red; position: relative;">
    <p class="marque" style="color: #333;">A simple tool to share text without signing up or logging in.</p>
    <button onclick="this.parentElement.style.display='none';" style="position: absolute; top: 5px; right: 10px; background-color: transparent; border: none; font-size: 16px; cursor: pointer;">&times;</button>
  </div>
  <header>
    <h1>Throw Your Text</h1>
  </header>
  <div id="editor"></div>
  <div>
    <button onclick="saveText()">Save Text</button>
    <button onclick="loadTexts()">Load Texts</button>
  </div>
  <div id="formattedContent"></div>

  <script>
    var quill = new Quill('#editor', {
  theme: 'snow'
});

async function saveText() {
  const text = quill.root.innerHTML;

  try {
    await fetch('/api/saveText', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ content: text })
    });
    // Clear the editor after successful submission
    quill.setText('');
  } catch (error) {
    console.error(error);
    // Handle errors if needed
  }
}


  async function loadTexts() {
    const response = await fetch('/api/getAllTexts');
    const texts = await response.json();

    const textList = document.getElementById('formattedContent');
    textList.innerHTML = '';

    texts.forEach((text) => {
      const listItem = document.createElement('div');
      listItem.innerHTML = `
      <div>${text.content}</div>
      <button class="delete" onclick="deleteText('${text._id}')">Delete</button>
      <button class="copy" onclick="copyText('${text._id}')">Copy</button>
    `;
      textList.appendChild(listItem);
    });
  }

  loadTexts();

  async function deleteText(textId) {
    try {
      // Make a DELETE request to your API endpoint
      await fetch(`/api/deleteText/${textId}`, {
        method: 'DELETE',
      });
  
      // Reload the text list after deleting the text
      loadTexts();
    } catch (error) {
      console.error('Error deleting text:', error);
      // Handle errors if needed
    }
  }
  
  async function copyText(textId) {
            try {
                const response = await fetch(`/api/getText/${textId}`);

                if (!response.ok) {
                    throw new Error(`Error: ${response.status} - ${response.statusText}`);
                }

                const text = await response.json();

                // Call the new copyFormattedText function
                copyFormattedText(text.content);


            } catch (error) {
                console.error('Error copying text:', error);
                alert('Failed to copy text. Check the console for details.');
            }
        }


        function copyFormattedText(formattedText) {
            const tempElement = document.createElement('div');
            tempElement.innerHTML = formattedText; // Set the formatted text

            tempElement.style.position = 'absolute';
            tempElement.style.left = '-9999px';
            tempElement.style.top = '0';
            document.body.appendChild(tempElement);

            const range = document.createRange();
            range.selectNodeContents(tempElement);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);

            try {
                document.execCommand('copy');
                console.log('Formatted text copied to clipboard!');
                alert("Text copied successfully!"); // Or other feedback

            } catch (err) {
                console.error('Unable to copy formatted text:', err);

                navigator.clipboard.writeText(tempElement.innerText) // Fallback
                    .then(() => {
                      console.log("Text copied (fallback)");
                      alert("Text copied successfully! (Plain Text)"); //Alerting for fallback
                    })
                    .catch(err => console.error("Clipboard API error:", err));
            } finally {
                document.body.removeChild(tempElement);
            }
        }


// Function to decode HTML entities
function decodeHTMLEntities(text) {
    const tempDiv = document.createElement("div");
    tempDiv.innerHTML = text;
    return tempDiv.textContent || tempDiv.innerText || "";
}

  // Track visitor on page load
async function trackVisitor() {
  try {
    await fetch('/api/track-visitor');
  } catch (error) {
    console.error('Error tracking visitor:', error);
  }
}

// Get and display visitor stats
async function loadVisitorStats() {
  try {
    const response = await fetch('/api/visitor-stats');
    const data = await response.json();

    document.getElementById('unique-visitors').innerText = `Unique Visitors: ${data.uniqueVisitors}`;
    document.getElementById('frequent-visitors').innerText = `Frequent Visitors: ${JSON.stringify(data.frequentVisitors)}`;
  } catch (error) {
    console.error('Error loading visitor stats:', error);
  }
}

// Call functions on page load
window.onload = () => {
  trackVisitor();
  loadVisitorStats();
};


  </script>
</body>
</html>
