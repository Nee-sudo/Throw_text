<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js" defer></script>
    <link rel="icon" href="image.png" type="image/x-icon" />
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A simple text-sharing tool to avoid signing up or logging in for transferring text between devices."
    />
    <!-- Prism.js CSS (for styling) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
    />
    <!-- Prism.js Script (for highlighting) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js" defer></script>
    <link rel="stylesheet" href="index.css" />
    <title>Simple Text Storage</title>
  </head>
  <body>
    <div
      class="marque-container"
      style="background-color: rgb(189, 195, 241); position: relative"
    >
      <p class="marque" style="color: #333">
        A simple tool to share text without signing up or logging in.
      </p>
      <button
        onclick="this.parentElement.style.display='none';"
        style="
          position: absolute;
          top: 5px;
          right: 10px;
          background-color: transparent;
          border: none;
          font-size: 16px;
          cursor: pointer;
        "
      >
        ×
      </button>
    </div>
    <div id="ad-bubble">
      <a href="https://throwyourtext.up.railway.app/ocean" target="_blank" rel="noreferrer">Visit Ocean</a>
      <button
        onclick="this.parentElement.style.display='none';"
        style="
          position: absolute;
          top: 5px;
          right: 10px;
          background-color: transparent;
          border: none;
          font-size: 16px;
          cursor: pointer;
        "
      >
        ×
      </button>
    </div>
    <header>
      <h1>Throw Your Text</h1>
    </header>
    <div id="editor"></div>
    <div class="button-container">
      <button id="saveButton">Save Text</button>
      <button id="loadButton">Load Texts</button>
      <button id="themeButton">Toggle Theme</button>
    </div>
    <p id="unique-visitors">Loading unique visitors...</p>
    <p id="frequent-visitors"><!---Loading frequent visitors... --></p>
    <div class="search-container">
      <input
        type="text"
        id="searchBar"
        placeholder="Search texts..."
        style="
          width: 100%;
          padding: 10px;
          margin: 20px 0;
          border: 1px solid #ccc;
          border-radius: 5px;
          font-size: 16px;
        "
        oninput="filterTexts(this.value)"
      />
    </div>
    <script>
      function filterTexts(query) {
        const textList = document.getElementById("formattedContent");
        const items = textList.querySelectorAll(".outer-snippet");
        query = query.toLowerCase();

        items.forEach((item) => {
          const content = item.querySelector(".inner-snippet").textContent.toLowerCase();
          if (content.includes(query)) {
            item.style.display = "block";
          } else {
            item.style.display = "none";
          }
        });
      }
    </script>
    <div id="formattedContent"></div>

    <script>
      function initializeApp() {
        if (typeof Quill === "undefined") {
          console.error("Quill.js failed to load. Please check the CDN or network connection.");
          return;
        }

        var quill = new Quill("#editor", {
          theme: "snow",
        });

        async function saveText() {
          const text = quill.root.innerHTML;
          try {
            const dateTime = new Date().toISOString();
            const serialNumber = Date.now();
            await fetch("/api/texts/save", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ content: text, dateTime, serialNumber }),
            });
            quill.setText("");
            loadTexts();
          } catch (error) {
            console.error(error);
          }
        }

        function formatContent(str) {
          return str
            .replace(/<\/p>\s*<p>/g, "\n")
            .replace(/<\/?p>/g, "")
            .trim();
        }

        async function loadTexts() {
          const textList = document.getElementById("formattedContent");
          textList.innerHTML = `<div class="progress-bar"></div>`;

          const response = await fetch("/api/texts/all");
          const texts = await response.json();

          texts.sort((a, b) => b.serialNumber - a.serialNumber);

          textList.innerHTML = ``;

          texts.forEach((text, index) => {
            const listItem = document.createElement("div");
            listItem.style.margin = "30px 0";
            const decodedContent = decodeHTMLEntities(text.content);

            listItem.innerHTML = `
              <div class="outer-snippet">
                <div class="title-bar">
                  <div class="red-dot dot"></div>
                  <div class="blue-dot dot"></div>
                  <div class="green-dot dot"></div>
                  <p style="color: white; float: left;">Count: ${index + 1}</p>
                  <p style="color: white; float: right;">DateTime: ${convertUTCToIST(text.dateTime)}</p>
                </div>
                <div class="inner-snippet">${text.content}</div>
                <center>
                  <button class="copy" onclick="copyText('${text._id}')">Copy</button>
                  <button class="delete" onclick="deleteText('${text._id}')">Delete</button>
                </center>
              </div>

            `;

            textList.appendChild(listItem);
          });

          Prism.highlightAll();
        }

        function decodeHTMLEntities(str) {
          let textarea = document.createElement("textarea");
          textarea.innerHTML = str;
          return textarea.value;
        }

        function escapeHTML(str) {
          return str
            .replace(/&/g, "&")
            .replace(/</g, "<")
            .replace(/>/g, ">")
            .replace(/"/g, "&;")
            .replace(/'/g, "'");
        }

        async function deleteText(textId) {
          try {
            await fetch(`/api/texts/${textId}`, {
              method: "DELETE",
            });
            loadTexts();
          } catch (error) {
            console.error("Error deleting text:", error);
          }
        }

        async function copyText(textId) {
          try {
            const response = await fetch(`/api/texts/${textId}`);
            if (!response.ok) {
              throw new Error(`Error: ${response.status} - ${response.statusText}`);
            }
            const text = await response.json();
            copyFormattedText(text.content);
          } catch (error) {
            console.error("Error copying text:", error);
            alert("Failed to copy text. Check the console for details.");
          }
        }

        // Attach copyText to the global window object
        window.copyText = copyText;

        function copyFormattedText(formattedText) {
          const tempElement = document.createElement("div");
          tempElement.innerHTML = formattedText;
          tempElement.style.position = "absolute";
          tempElement.style.left = "-9999px";
          tempElement.style.top = "0";
          document.body.appendChild(tempElement);

          const range = document.createRange();
          range.selectNodeContents(tempElement);
          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);

          try {
            document.execCommand("copy");
            alert("Text copied successfully!");
          } catch (err) {
            console.error("Unable to copy formatted text:", err);
            navigator.clipboard
              .writeText(tempElement.innerText)
              .then(() => alert("Text copied successfully! (Plain Text)"))
              .catch((err) => console.error("Clipboard API error:", err));
          } finally {
            document.body.removeChild(tempElement);
          }
        }

        async function trackVisitor() {
          try {
            await fetch("/api/visitors/track-visitor");
          } catch (error) {
            console.error("Error tracking visitor:", error);
          }
        }

        function convertUTCToIST(utcTimestamp) {
          if (!utcTimestamp) {
            return "N/A";
          }
          const utcDate = new Date(utcTimestamp);
          return utcDate.toLocaleString("en-IN");
        }

        async function loadVisitorStats() {
          try {
            const response = await fetch("/api/visitors/stats");
            const data = await response.json();
            document.getElementById("unique-visitors").innerText = `Unique Visitors: ${data.uniqueVisitors}`;
          } catch (error) {
            console.error("Error loading visitor stats:", error);
          }
        }

        function toggleTheme() {
          const body = document.body;
          const editor = document.getElementById("editor");
          const uniqueVisitors = document.getElementById("unique-visitors");
          const isDarkMode = body.classList.toggle("light-mode");

          localStorage.setItem("theme", isDarkMode ? "dark" : "light");
          editor.style.backgroundColor = isDarkMode ? "#333" : "hsl(0, 0%, 98%)";
          editor.style.color = isDarkMode ? "#fff" : "#000";
          uniqueVisitors.style.color = isDarkMode ? "red" : "red"; // Black in light mode, white in dark mode
        }

        // Initialize app and attach event listeners
        trackVisitor();
        loadVisitorStats();
        loadTexts();
        const savedTheme = localStorage.getItem("theme");
        const editor = document.getElementById("editor");
        const uniqueVisitors = document.getElementById("unique-visitors");

        // Default to dark mode if no theme is saved
        if (!savedTheme || savedTheme === "dark") {
          document.body.classList.remove("light-mode");
          editor.style.backgroundColor = "#333";
          editor.style.color = "#fff";
          uniqueVisitors.style.color = "#fff";
          localStorage.setItem("theme", "dark");
        } else {
          document.body.classList.add("light-mode");
          editor.style.backgroundColor = "hsl(0, 0%, 98%)";
          editor.style.color = "#000";
          uniqueVisitors.style.color = "#333";
        }

        document.getElementById("saveButton").addEventListener("click", saveText);
        document.getElementById("loadButton").addEventListener("click", loadTexts);
        document.getElementById("themeButton").addEventListener("click", toggleTheme);
      }

      window.addEventListener("load", function () {
        initializeApp();
      });
    </script>
  </body>
</html>
