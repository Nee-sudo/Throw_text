<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="A simple text-sharing tool to avoid signing up or logging in for transferring text between devices."
    />
    <link rel="icon" href="image.png" type="image/x-icon" />
    <link rel="preconnect" href="https://cdn.quilljs.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.quilljs.com" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css"
      />
    </noscript>
    <link rel="stylesheet" href="index.css" />
    <title>Simple Text Storage</title>
    <script src="https://cdn.quilljs.com/1.3.6/quill.js" defer></script>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"
      defer
    ></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="marque-container">
      <p class="marque">
        A simple tool to share text without signing up or logging in.
      </p>
      <button
        type="button"
        class="dismiss-btn"
        aria-label="Dismiss banner"
        onclick="this.parentElement.style.display='none';"
      >
        ×
      </button>
    </div>
    <div id="ad-bubble">
      <a href="/ocean" target="_blank" rel="noreferrer">Visit Ocean</a>
      <button
        type="button"
        class="dismiss-btn dismiss-btn--bubble"
        aria-label="Dismiss ad"
        onclick="this.parentElement.style.display='none';"
      >
        ×
      </button>
    </div>
    <header>
      <h1>Throw Your Text</h1>
    </header>
    <div id="editor"></div>
    <div class="button-container">
      <button type="button" id="saveButton">Save Text</button>
      <button type="button" id="loadButton">Load Texts</button>
      <button type="button" id="themeButton">Toggle Theme</button>
    </div>
    <p id="unique-visitors">Loading unique visitors...</p>
    <div class="search-container">
      <input
        type="search"
        id="searchBar"
        placeholder="Search texts..."
        autocomplete="off"
        enterkeyhint="search"
      />
    </div>
    <main id="formattedContent" aria-live="polite"></main>
  </body>
</html>
