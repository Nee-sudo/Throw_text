<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box</title>
    <link rel="stylesheet" href="box.css">
</head>
<body>
    <div id="input-area">
  <input type="text" id="message-title" placeholder="Enter title..." maxlength="10"> <br> <br>
  <input type="text" id="message-input" placeholder="Enter your message...">
  <button id="throw-button">Throw</button>
</div>
    <div class="app">
        <div class="scene-container">
          <div class="sky"></div>
          <div id="pond">
            <div class="ocean">
                <div class="ocean-floor">
                    <div class="ocean-floor-contents">
                        </div>
                <!-- DIVER -->
                <div class="diver">
                  <div class="happy-birthday">
                    <h5>Happy Birthday!!</h5>
                  </div>
                  <div class="diver-head">
                    <div class="diver-mask">
                      <div class="eyes">
                        <div class="eye eye-1"></div>
                        <div class="eye eye-2"></div>
                      </div>
                    </div>
                  </div>
                  <div class="diver-body">
                    <div class="tank"></div>
                    <div class="diver-arm"></div>
                  </div>
                  <div class="diver-legs">
                    <div class="diver-leg diver-leg-1">
                      <div class="leg"></div>
                      <div class="fin fin-1"></div>
                    </div>
                    <div class="diver-leg diver-leg-2">
                      <div class="leg"></div>
                      <div class="fin fin-2"></div>
                    </div>
                  </div>
                </div>
                <!-- DIVER ENDS-->
                <div class="ocean-floor">
                  <div class="ocean-floor-contents">
                    <div class="crab">
                      <div class="crab-claw crab-claw-left"></div>
                      <div class="crab-body">
                        <div class="crab-head"></div>
                        <div class="crab-legs">
                          <div class="crab-leg"></div>
                          <div class="crab-leg"></div>
                        </div>
                      </div>
                      <div class="crab-claw crab-claw-right"></div>
                    </div>
                  </div>
                  <!-- SEAWEED-->
                </div>
              </div>
          </div>
        </div>
      </div>
      <script src="box.js"></script>
</body>
</html>
